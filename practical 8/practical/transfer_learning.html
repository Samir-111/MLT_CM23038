<!DOCTYPE html>
<html>
<head>

<title>Transfer Learning</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier"></script>

</head>

<body style="font-family:Arial;text-align:center">

<h2>Custom Image Classifier</h2>

<p id="status">Loading MobileNet...</p>

<input type="file" id="imgUpload">

<br><br>

<button onclick="addExample('Apple')">Add Apple</button>
<button onclick="addExample('Banana')">Add Banana</button>
<button onclick="addExample('Orange')">Add Orange</button>

<br><br>

<button onclick="predict()">Predict</button>

<h3 id="result"></h3>

<img id="preview" width="250">

<script>

let net;
let classifier;

async function loadModel(){

net = await mobilenet.load();

classifier = knnClassifier.create();

document.getElementById("status").innerHTML="Model Loaded";

}

loadModel();

function getImage(){

let file=document.getElementById("imgUpload").files[0];

let img=document.getElementById("preview");

img.src=URL.createObjectURL(file);

return img;

}

async function addExample(label){

let img=getImage();

await new Promise(r=>img.onload=r);

const activation=net.infer(img,true);

classifier.addExample(activation,label);

alert(label+" image added");

}

async function predict(){

let img=getImage();

await new Promise(r=>img.onload=r);

const activation=net.infer(img,true);

const result=await classifier.predictClass(activation);

document.getElementById("result").innerHTML=
"Prediction: "+result.label;

}

</script>

</body>
</html>
