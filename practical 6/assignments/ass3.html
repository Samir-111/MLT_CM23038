<!DOCTYPE html>
<html>
<head>

<title>Single vs Multi Pose</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<style>
body{text-align:center;font-family:Arial;background:#f4f4f4}
video{display:none}
canvas{border-radius:10px}
</style>

</head>

<body>

<h2>Single vs Multi Pose Detection</h2>

<button onclick="mode='single'">Single Pose</button>
<button onclick="mode='multi'">Multi Pose</button>

<h3 id="mode">Mode: Single</h3>

<video id="video" width="500" height="400" autoplay></video>
<canvas id="canvas" width="500" height="400"></canvas>

<script>

let net;
let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

let mode="single";

async function setupCamera(){
const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;
return new Promise(resolve=>{
video.onloadedmetadata=()=>resolve(video);
});
}

async function loadModel(){
net=await posenet.load();
}

async function detect(){

ctx.drawImage(video,0,0,500,400);

if(mode==="single"){

const pose=await net.estimateSinglePose(video);
document.getElementById("mode").innerHTML="Mode: Single Pose";

}

else{

const poses=await net.estimateMultiplePoses(video);
document.getElementById("mode").innerHTML="Mode: Multi Pose";

}

requestAnimationFrame(detect);

}

async function main(){
await setupCamera();
await loadModel();
detect();
}

main();

</script>

</body>
</html>
