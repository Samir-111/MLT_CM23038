<!DOCTYPE html>
<html>
<head>

<title>🔥 Pose Accuracy Analyzer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<style>
body{
  text-align:center;
  font-family:Arial;
  background:#111;
  color:white;
}
canvas{
  border:2px solid white;
  border-radius:10px;
}
</style>

</head>

<body>

<h2>🔥 Pose Accuracy Analyzer (Advanced)</h2>

<video id="video" width="700" height="500" autoplay playsinline style="display:none;"></video>
<canvas id="canvas" width="700" height="500"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🎥 Camera Setup
async function setupCamera(){
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:700,height:500}
  });
  video.srcObject = stream;

  return new Promise(resolve=>{
    video.onloadedmetadata = ()=>resolve(video);
  });
}

// 🔴 Keypoints
function drawKeypoints(keypoints){
  keypoints.forEach(point=>{
    if(point.score > 0.5){
      ctx.beginPath();
      ctx.arc(point.position.x, point.position.y, 6, 0, 2*Math.PI);
      ctx.fillStyle = "red";
      ctx.fill();
    }
  });
}

// 🟢 Skeleton
function drawSkeleton(keypoints){
  const pairs = posenet.getAdjacentKeyPoints(keypoints, 0.5);

  pairs.forEach(points=>{
    ctx.beginPath();
    ctx.moveTo(points[0].position.x, points[0].position.y);
    ctx.lineTo(points[1].position.x, points[1].position.y);
    ctx.lineWidth = 3;
    ctx.strokeStyle = "lime";
    ctx.stroke();
  });
}

// 🎯 Accuracy Color Logic
function getColor(score){
  if(score > 0.7) return "lime";
  if(score > 0.4) return "yellow";
  return "red";
}

// 🚀 Detection
async function detectPose(){

  const net = await posenet.load({
    architecture:"MobileNetV1",
    outputStride:16,
    inputResolution:{width:700,height:500},
    multiplier:0.75
  });

  async function poseFrame(){

    const poses = await net.estimateMultiplePoses(video,{
      maxDetections:5,
      scoreThreshold:0.5,
      nmsRadius:20
    });

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(video,0,0,canvas.width,canvas.height);

    poses.forEach((pose,index)=>{

      const score = pose.score;
      const color = getColor(score);

      drawKeypoints(pose.keypoints);
      drawSkeleton(pose.keypoints);

      // 🧠 Show Accuracy Text
      ctx.font = "20px Arial";
      ctx.fillStyle = color;
      ctx.fillText(
        "Person " + (index+1) + " Score: " + score.toFixed(2),
        10,
        30 + (index*30)
      );
    });

    requestAnimationFrame(poseFrame);
  }

  poseFrame();
}

// 🎬 Start
async function main(){
  await setupCamera();
  video.play();
  detectPose();
}

main();

</script>

</body>
</html>
