<!DOCTYPE html>
<html>
<head>

<title>Pose Detection</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<style>

body{
text-align:center;
font-family:Arial;
background:#f4f4f4;
}

video{
display:none;
}

canvas{
border-radius:10px;
}

</style>

</head>

<body>

<h2>Pose Detection with Webcam</h2>

<p id="status">Loading PoseNet Model...</p>

<video id="video" width="500" height="400" autoplay></video>

<canvas id="canvas" width="500" height="400"></canvas>

<script>

let net;
let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

async function setupCamera(){

const stream=await navigator.mediaDevices.getUserMedia({video:true});
video.srcObject=stream;

return new Promise(resolve=>{
video.onloadedmetadata=()=>resolve(video);
});

}

async function loadModel(){

net=await posenet.load();

document.getElementById("status").innerHTML="Model Loaded";

}

function drawKeypoints(keypoints){

keypoints.forEach(k=>{
if(k.score>0.5){

ctx.beginPath();
ctx.arc(k.position.x,k.position.y,5,0,2*Math.PI);
ctx.fillStyle="red";
ctx.fill();

}
});

}

function drawSkeleton(keypoints){

const adjacent=posenet.getAdjacentKeyPoints(keypoints,0.5);

adjacent.forEach(pair=>{

ctx.beginPath();

ctx.moveTo(pair[0].position.x,pair[0].position.y);
ctx.lineTo(pair[1].position.x,pair[1].position.y);

ctx.strokeStyle="green";
ctx.lineWidth=2;
ctx.stroke();

});

}

async function detectPose(){

const pose=await net.estimateSinglePose(video);

ctx.drawImage(video,0,0,500,400);

drawKeypoints(pose.keypoints);
drawSkeleton(pose.keypoints);

requestAnimationFrame(detectPose);

}

async function main(){

await setupCamera();
await loadModel();
detectPose();

}

main();

</script>

</body>
</html>
