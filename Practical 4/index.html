<!DOCTYPE html>
<html>
<head>

<title>Image Classification using MobileNet</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:650px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

img{
margin-top:20px;
border-radius:10px;
}

button{
padding:12px 25px;
background:#2ecc71;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

</style>

</head>

<body>

<div class="container">

<h2>Image Classification using MobileNet</h2>

<h4 id="status">Loading AI Model...</h4>

<input type="file" id="upload">

<br>

<img id="img" width="350">

<br><br>

<button onclick="classifyImage()">Classify Image</button>

<h3>Prediction Results</h3>

<div id="result"></div>

</div>

<script>

let model;

async function loadModel(){

model = await mobilenet.load();

document.getElementById("status").innerHTML="Model Loaded Successfully";

}

loadModel();

async function classifyImage(){

if(!model){
alert("Model still loading...");
return;
}

const file=document.getElementById("upload").files[0];

if(!file){
alert("Please upload an image");
return;
}

const img=document.getElementById("img");

img.src=URL.createObjectURL(file);

await new Promise(resolve=>img.onload=resolve);

const predictions=await model.classify(img);

let output="";

for(let i=0;i<3;i++){

output+=predictions[i].className+" : "+
(predictions[i].probability*100).toFixed(2)+" %<br>";

}

document.getElementById("result").innerHTML=output;

}

</script>

</body>
</html>
